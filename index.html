<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Sand — Team Time Zones</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1117;
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 780px;
  }

  .card {
    background: #16191f;
    border: 1px solid #2a2d35;
    border-radius: 10px;
    padding: 20px 18px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.7;
  }

  .card:hover {
    border-color: var(--accent);
  }

  .city {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b7280;
    margin-bottom: 6px;
  }

  .time {
    font-size: 28px;
    font-weight: 500;
    color: #f0f0f0;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .date {
    font-size: 11px;
    color: #4b5563;
    letter-spacing: 0.04em;
  }

  .tz-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 10px;
    color: var(--accent);
    opacity: 0.8;
    letter-spacing: 0.06em;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (max-width: 580px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="grid" id="clocks"></div>

<script>
  const zones = [
    { city: "Honolulu",       tz: "Pacific/Honolulu",   label: "HST",  accent: "#38bdf8" },
    { city: "Los Angeles",    tz: "America/Los_Angeles", label: "PT",   accent: "#a78bfa" },
    { city: "Denver",         tz: "America/Denver",      label: "MT",   accent: "#34d399" },
    { city: "Chicago",        tz: "America/Chicago",     label: "CT",   accent: "#fb923c" },
    { city: "Washington D.C.",tz: "America/New_York",    label: "ET",   accent: "#f472b6" },
    { city: "Buenos Aires",   tz: "America/Argentina/Buenos_Aires", label: "ART", accent: "#fbbf24" },
  ];

  const grid = document.getElementById('clocks');

  zones.forEach(z => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--accent', z.accent);
    card.innerHTML = `
      <div class="city"><span class="dot"></span>${z.city}</div>
      <div class="time" id="time-${z.label}">--:--:--</div>
      <div class="date" id="date-${z.label}">---</div>
      <div class="tz-badge">${z.label}</div>
    `;
    grid.appendChild(card);
  });

  function update() {
    const now = new Date();
    zones.forEach(z => {
      const timeEl = document.getElementById('time-' + z.label);
      const dateEl = document.getElementById('date-' + z.label);
      if (!timeEl) return;

      const timeStr = now.toLocaleTimeString('en-US', {
        timeZone: z.tz,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: true
      });

      const dateStr = now.toLocaleDateString('en-US', {
        timeZone: z.tz,
        weekday: 'short',
        month: 'short',
        day: 'numeric'
      });

      timeEl.textContent = timeStr;
      dateEl.textContent = dateStr;
    });
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
